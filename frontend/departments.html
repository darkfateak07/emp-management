<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Departments - Employee Management System</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="navbar-container">
      <h1 class="logo">Employee Management</h1>
      <div class="navbar-right">
        <span id="adminName" class="admin-name"></span>
        <button onclick="logout()" class="btn-logout">Logout</button>
      </div>
    </div>
  </nav>

  <div class="container">
    <aside class="sidebar">
      <ul class="nav-menu">
        <li><a href="dashboard.html" class="nav-link">Dashboard</a></li>
        <li><a href="employees.html" class="nav-link">Employees</a></li>
        <li><a href="departments.html" class="nav-link active">Departments</a></li>
      </ul>
    </aside>

    <main class="main-content">
      <div class="page-header">
        <h2>Department Management</h2>
        <button class="btn-primary" onclick="openAddDepartmentModal()">+ Add Department</button>
      </div>

      <table class="table">
        <thead>
          <tr>
            <th>Department Name</th>
            <th>Description</th>
            <th>Created Date</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="departmentsTable">
          <tr>
            <td colspan="4" class="text-center">Loading...</td>
          </tr>
        </tbody>
      </table>
    </main>
  </div>

  <!-- Add/Edit Department Modal -->
  <div id="departmentModal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeDepartmentModal()">&times;</span>
      <h2 id="modalTitle">Add Department</h2>
      <form id="departmentForm">
        <div class="form-group">
          <label for="deptName">Department Name:</label>
          <input type="text" id="deptName" required>
        </div>
        <div class="form-group">
          <label for="deptDescription">Description:</label>
          <textarea id="deptDescription" rows="4"></textarea>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn-primary">Save</button>
          <button type="button" class="btn-secondary" onclick="closeDepartmentModal()">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Delete Confirmation Modal -->
  <div id="deleteModal" class="modal">
    <div class="modal-content modal-sm">
      <h2>Confirm Delete</h2>
      <p>Are you sure you want to delete this department?</p>
      <div class="form-actions">
        <button class="btn-danger" onclick="confirmDelete()">Delete</button>
        <button class="btn-secondary" onclick="closeDeleteModal()">Cancel</button>
      </div>
    </div>
  </div>

  <script src="js/common.js"></script>
  <script src="js/departments.js"></script>
</body>
</html>
